# Tenant configuration
# Each tenant maps to a company using Salary Hero CS chatbot

tenants:
  hns:
    name: "HNS Company"
    company_id: "happy_nest_space"   # matches company_id in solutions_faq.csv
    language_default: "th"
    languages_supported:
      - th
      - en
    line_channel_access_token: "${HNS_LINE_CHANNEL_ACCESS_TOKEN}"
    line_channel_secret: "${HNS_LINE_CHANNEL_SECRET}"
    vector_collections:
      th: "happy_nest_space_th"
      en: "happy_nest_space_en"
    features:
      withdrawal_diagnosis: true
      troubleshooting_agent: true
      human_handoff: true
    excluded_source_types:
      - feature_flexben
    handoff:
      method: "line_transfer"       # line_transfer | webhook | email
      contact_info: "HR Department"

