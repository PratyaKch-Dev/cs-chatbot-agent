# Answer templates for troubleshooting responses.
#
# Edit the `template` fields to improve what the bot says to users.
# Variables in {braces} are filled in from diagnostic data at runtime.
#
# Available variables:
#   {name}             — employee name
#   {employee_id}      — employee ID
#   {status}           — account status (active / inactive / suspended)
#   {last_sync}        — last sync timestamp
#   {next_sync}        — next sync timestamp
#   {remarks}          — system remarks found in attendance records
#   {deductions}       — formatted deduction list
#   {attendance_table} — formatted attendance table

# ── 1. Normal active user — all systems good ─────────────────────────────────
normal_active:
  th:
    template: |
      ตรวจสอบข้อมูลของ {name} แล้ว ทุกอย่างปกติค่ะ สามารถเบิกเงินได้ตามปกติ

      ถ้ายังเบิกไม่ได้ ลองทำตามนี้นะคะ:
      1. ปิดแอปแล้วเปิดใหม่
      2. ตรวจสอบอินเทอร์เน็ต
      3. หากยังไม่ได้แจ้งได้เลยค่ะ
  en:
    template: |
      Everything for {name} looks good. You should be able to withdraw as normal.

      If you still can't withdraw, try these steps:
      1. Close and reopen the app
      2. Check your internet connection
      3. Still not working? Contact your Salary Hero admin

# ── 2. Account status inactive ───────────────────────────────────────────────
status_inactive:
  th:
    template: |
      บัญชีของ {name} มีสถานะ "{status}" จึงยังไม่สามารถเบิกเงินได้ค่ะ

      วิธีแก้ไข:
      - ติดต่อ HR เพื่อขอเปลี่ยนสถานะเป็น active
      ถ้า HR อัปเดตเรียบร้อยแล้ว ลองทำตามนี้นะคะ:
        1. ปิดแอปแล้วเปิดใหม่
        2. ลองเช็คดูว่าสถานะอัปเดตหรือยัง
  en:
    template: |
      {name}'s account is currently "{status}". This is why withdrawals are blocked.

      What to do:
      - Contact HR and ask them to set your account to active
      - After HR updates, wait for the nightly sync. You'll then be able to withdraw

# ── 3. Account suspended by HR ───────────────────────────────────────────────
suspended:
  th:
    template: |
      บัญชีของ {name} มีสถานะ "{status}" จึงยังไม่สามารถเบิกเงินได้ค่ะ

      วิธีแก้ไข:
      - ติดต่อ HR เพื่อขอเปลี่ยนสถานะเป็น active
      ถ้า HR อัปเดตเรียบร้อยแล้ว ลองทำตามนี้นะคะ:
        1. ปิดแอปแล้วเปิดใหม่
        2. ลองเช็คดูว่าสถานะอัปเดตหรือยัง
  en:
    template: |
      {name}'s account is currently "{status}". This is why withdrawals are blocked.

      What to do:
      - Contact HR and ask them to set your account to active
      - After HR updates, wait for the nightly sync. You'll then be able to withdraw

# ── 4. Blacklisted ───────────────────────────────────────────────────────────
blacklisted:
  th:
    template: |
      บัญชีของ {name} ถูกระงับ (blacklist) ชั่วคราว จึงเบิกเงินไม่ได้ค่ะ

      วิธีแก้ไข:
      - ติดต่อ HR เพื่อสอบถามสาเหตุและขอปลด blacklist
      - เมื่อ HR ปลดแล้ว จะเบิกเงินได้ทันทีค่ะ
  en:
    template: |
      {name}'s account is temporarily blacklisted, so you can't withdraw right now.

      What to do:
      - Contact HR to ask why and request removal from the blacklist
      - Once HR removes the blacklist, you can withdraw again in the next cycle

# ── 5. Attendance — null check-in/out or system remarks ──────────────────────
attendance_remark:
  th:
    template: |
      พบข้อมูลเข้า-ออกงานของ {name} ไม่สมบูรณ์ อาจทำให้ยอดเงินไม่ถูกต้องค่ะ

      {attendance_table}

      วิธีแก้ไข:
      - แจ้ง HR ให้ตรวจสอบและแก้ไขรายการที่ขาดหรือมีหมายเหตุ
      - หลัง HR แก้ไข รอระบบซิงค์คืนนี้ ยอดเงินจะอัปเดตค่ะ
  en:
    template: |
      {name} has incomplete check-in/out records, which may cause the balance to be wrong.

      {attendance_table}

      What to do:
      - Ask HR to check and fix any missing or flagged entries
      - After HR updates, wait for tonight's sync. The balance will update

# ── 6. Deductions ────────────────────────────────────────────────────────────
has_deductions:
  th:
    template: |
      ยอดเงินของ {name} ถูกหักจากรายการต่อไปนี้ค่ะ:

      {deductions}

      ยอดเงินในแอปหักรายการเหล่านี้แล้ว
      ถ้าคิดว่ามีรายการผิด ติดต่อ HR ให้ช่วยตรวจสอบได้เลยค่ะ
  en:
    template: |
      {name}'s balance was reduced by these items:

      {deductions}

      The app already subtracts these amounts.
      If you think something is wrong, please ask HR to check

# ── 7. Sync pending ───────────────────────────────────────────────────────────
sync_pending:
  th:
    template: |
      ยอดเงินของ {name} ยังไม่อัปเดต เพราะระบบกำลังซิงค์ข้อมูลเงินเดือนค่ะ

      - ซิงค์ล่าสุด: {last_sync}
      - ซิงค์ถัดไป: {next_sync}

      รอให้ระบบซิงค์เสร็จ ยอดเงินจะอัปเดตและเบิกได้ทันที
      ถ้าต้องการด่วน แจ้ง HR หรือแอดมินให้ช่วยซิงค์ได้เลยค่ะ
  en:
    template: |
      {name}'s balance hasn't updated yet because payroll sync is in progress.

      - Last sync: {last_sync}
      - Next sync: {next_sync}

      Wait for the sync to finish — your balance will update and you can withdraw.
      If it's urgent, ask HR or your admin to run a manual sync
